name: Deploy Preview to GitHub Pages

on:
  push:
    branches: ["copilot/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Share the 'pages' group with deploy.yml to prevent concurrent GitHub Pages deployments.
  # With cancel-in-progress: false, runs are serialized rather than cancelled.
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (main + preview)
    runs-on: ubuntu-latest
    env:
      # Required for GitHub Actions to use Node.js 24 compatible JavaScript actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout feature branch (preview site)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview site (base /pie-hole/preview)
        run: |
          cat > astro.config.mjs << 'EOF'
          import { defineConfig } from 'astro/config';
          export default defineConfig({
            site: 'https://sagreenxyz.github.io',
            base: '/pie-hole/preview',
          });
          EOF
          npm run build

      - name: Deploy preview to gh-pages branch under preview/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: preview
          # keep_files preserves the production root while adding/updating preview/
          keep_files: true
